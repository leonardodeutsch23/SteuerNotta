<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title description">
  <title id="title">SteuerNotta responsive homepage wireframe</title>
  <desc id="description">Low-fidelity mobile, tablet and desktop layouts with identical navbar, hero, problem, four benefits, five How It Works steps, three language cards and footer.</desc>
  <style>
    .canvas{fill:#f5f7fa}.panel{fill:#fff;stroke:#243447;stroke-width:2}.section{fill:#f8fafc;stroke:#64748b;stroke-width:1.2}.strong{fill:#dbeafe;stroke:#1d4ed8;stroke-width:1.3}.future{fill:#fff7ed;stroke:#c2410c;stroke-width:1.2}.footer{fill:#dbe4ee;stroke:#475569;stroke-width:1.2}.title{font:700 25px Arial,sans-serif;fill:#0f172a}.heading{font:700 16px Arial,sans-serif;fill:#0f172a}.label{font:700 12px Arial,sans-serif;fill:#0f172a}.text{font:11px Arial,sans-serif;fill:#334155}.tiny{font:9px Arial,sans-serif;fill:#475569}.line{stroke:#64748b;stroke-width:1.2}.dot{fill:#fff;stroke:#1d4ed8;stroke-width:1.3}.n{font:700 10px Arial,sans-serif;fill:#1d4ed8;text-anchor:middle}.center{text-anchor:middle}
  </style>

  <rect class="canvas" width="1600" height="1100"/>
