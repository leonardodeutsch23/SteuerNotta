<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="title description">
  <title id="title">SteuerNotta responsive long-form and success-page wireframe</title>
  <desc id="description">Low-fidelity mobile, tablet and desktop layouts with a form introduction, the safety disclaimer, seven open form sections and matching success pages. All layouts include the same disclaimers; each target success layout includes Home and Return to Form actions.</desc>
  <style>
    .canvas{fill:#f5f7fa}.panel{fill:#fff;stroke:#243447;stroke-width:2}.section{fill:#f8fafc;stroke:#64748b;stroke-width:1.2}.strong{fill:#dbeafe;stroke:#1d4ed8;stroke-width:1.3}.footer{fill:#dbe4ee;stroke:#475569;stroke-width:1.2}.button{fill:#dbeafe;stroke:#1d4ed8;stroke-width:1.3}.title{font:700 25px Arial,sans-serif;fill:#0f172a}.heading{font:700 16px Arial,sans-serif;fill:#0f172a}.label{font:700 12px Arial,sans-serif;fill:#0f172a}.text{font:11px Arial,sans-serif;fill:#334155}.tiny{font:9px Arial,sans-serif;fill:#475569}.center{text-anchor:middle}.ok{font:700 32px Arial,sans-serif;fill:#1d4ed8;text-anchor:middle}
  </style>
  <rect class="canvas" width="1600" height="1200"/>
  <text class="title" x="30" y="38">SteuerNotta — canonical long-form and success-page wireframes</text>
  <text class="text" x="30" y="60">Seven open sections · no wizard · no progress · no saved data · no calculations · no uploads · same content at every width</text>

  <!-- Desktop form -->
  <text class="heading" x="30" y="92">Desktop form — approximately 1440px</text>
  <rect class="panel" x="25" y="105" width="700" height="720" rx="8"/>
  <rect class="section" x="40" y="120" width="670" height="46" rx="5"/>
  <text class="label" x="55" y="149">Logo + SteuerNotta</text><text class="text" x="585" y="149">Back to Home</text>
  <rect class="section" x="40" y="178" width="670" height="45" rx="5"/>
  <text class="label" x="55" y="198">Form introduction + provisional-content status</text><text class="tiny" x="55" y="214">Educational structure · German-first terminology on translated forms</text>
  <rect class="strong" x="40" y="235" width="670" height="65" rx="5"/>
  <text class="label center" x="375" y="262">Educational prototype · tax year 2025 · fictitious data only</text>
  <text class="tiny center" x="375" y="283">No tax advice · no ELSTER · no upload/transmission/persistence · browser validation is not fiscal validation</text>
  <rect class="section" x="40" y="312" width="670" height="55" rx="5"/><text class="label" x="55" y="338">1. Case Screening and Scope</text><text class="tiny" x="390" y="338">two-column fields · help for complex terms</text>
  <rect class="section" x="40" y="375" width="670" height="55" rx="5"/><text class="label" x="55" y="401">2. Tax Return and Personal Details</text><text class="tiny" x="390" y="401">personal / household / address / bank concepts</text>
  <rect class="section" x="40" y="438" width="670" height="55" rx="5"/><text class="label" x="55" y="464">3. Employment Income</text><text class="tiny" x="390" y="464">selected employer-reported data · not an official certificate</text>
  <rect class="section" x="40" y="501" width="670" height="55" rx="5"/><text class="label" x="55" y="527">4. Work-related Expenses</text><text class="tiny" x="390" y="527">selected Werbungskosten concepts</text>
  <rect class="section" x="40" y="564" width="670" height="55" rx="5"/><text class="label" x="55" y="590">5. Deductions</text><text class="tiny" x="390" y="590">distinct official subgroups remain labelled</text>
  <rect class="section" x="40" y="627" width="670" height="55" rx="5"/><text class="label" x="55" y="653">6. Documents</text><text class="tiny" x="390" y="653">non-exhaustive records checklist · no file controls</text>
  <rect class="section" x="40" y="690" width="670" height="55" rx="5"/><text class="label" x="55" y="716">7. Review and Confirmation</text><text class="tiny" x="390" y="716">demo limits · fictitious-data confirmation</text>
  <rect class="button" x="530" y="758" width="180" height="42" rx="5"/><text class="label center" x="620" y="784">Finish demo</text>

  <!-- Tablet form -->
  <text class="heading" x="760" y="92">Tablet form — approximately 768px</text>
  <rect class="panel" x="755" y="105" width="410" height="720" rx="8"/>
  <rect class="section" x="770" y="120" width="380" height="44" rx="5"/><text class="label" x="785" y="147">Logo</text><text class="text" x="1060" y="147">Back Home</text>
  <rect class="section" x="770" y="176" width="380" height="45" rx="5"/><text class="label" x="785" y="197">Form introduction + status</text><text class="tiny" x="785" y="213">Educational structure · German-first labels</text>
  <rect class="strong" x="770" y="233" width="380" height="70" rx="5"/><text class="label center" x="960" y="258">Educational prototype · 2025</text><text class="tiny center" x="960" y="277">Fictitious data · no advice · no ELSTER</text><text class="tiny center" x="960" y="292">No upload/transmission/persistence · validation is not fiscal</text>
  <rect class="section" x="770" y="315" width="380" height="52" rx="5"/><text class="label" x="785" y="338">1. Case Screening and Scope</text><text class="tiny" x="785" y="355">1–2 columns where readable</text>
  <rect class="section" x="770" y="374" width="380" height="52" rx="5"/><text class="label" x="785" y="397">2. Tax Return and Personal Details</text><text class="tiny" x="785" y="414">ES/EN: German + translation · DE: German only</text>
  <rect class="section" x="770" y="433" width="380" height="52" rx="5"/><text class="label" x="785" y="456">3. Employment Income</text><text class="tiny" x="785" y="473">help beside complex terms</text>
  <rect class="section" x="770" y="492" width="380" height="52" rx="5"/><text class="label" x="785" y="522">4. Work-related Expenses</text>
  <rect class="section" x="770" y="551" width="380" height="52" rx="5"/><text class="label" x="785" y="581">5. Deductions</text>
  <rect class="section" x="770" y="610" width="380" height="52" rx="5"/><text class="label" x="785" y="640">6. Documents checklist</text>
  <rect class="section" x="770" y="669" width="380" height="52" rx="5"/><text class="label" x="785" y="699">7. Review and Confirmation</text>
  <rect class="button" x="970" y="758" width="180" height="42" rx="5"/><text class="label center" x="1060" y="784">Finish demo</text>

  <!-- Mobile form -->
  <text class="heading" x="1200" y="92">Mobile form — approximately 375px</text>
  <rect class="panel" x="1195" y="105" width="380" height="720" rx="8"/>
  <rect class="section" x="1210" y="120" width="350" height="42" rx="5"/><text class="label" x="1225" y="146">Logo</text><text class="text" x="1480" y="146">Back Home</text>
  <rect class="section" x="1210" y="174" width="350" height="45" rx="5"/><text class="label" x="1225" y="195">Form introduction + status</text><text class="tiny" x="1225" y="211">Educational structure · German-first labels</text>
  <rect class="strong" x="1210" y="231" width="350" height="75" rx="5"/><text class="label center" x="1385" y="255">Educational prototype · 2025</text><text class="tiny center" x="1385" y="275">Fictitious data · no advice · no ELSTER</text><text class="tiny center" x="1385" y="292">No upload/transmission/persistence · validation is not fiscal</text>
  <rect class="section" x="1210" y="318" width="350" height="51" rx="5"/><text class="label" x="1225" y="341">1. Case Screening and Scope</text><text class="tiny" x="1225" y="357">single-column fields</text>
  <rect class="section" x="1210" y="377" width="350" height="51" rx="5"/><text class="label" x="1225" y="400">2. Tax Return and Personal Details</text><text class="tiny" x="1225" y="416">ES/EN: German + translation · DE: German only</text>
  <rect class="section" x="1210" y="436" width="350" height="51" rx="5"/><text class="label" x="1225" y="466">3. Employment Income</text>
  <rect class="section" x="1210" y="495" width="350" height="51" rx="5"/><text class="label" x="1225" y="525">4. Work-related Expenses</text>
  <rect class="section" x="1210" y="554" width="350" height="51" rx="5"/><text class="label" x="1225" y="584">5. Deductions</text>
  <rect class="section" x="1210" y="613" width="350" height="51" rx="5"/><text class="label" x="1225" y="643">6. Documents checklist</text>
  <rect class="section" x="1210" y="672" width="350" height="51" rx="5"/><text class="label" x="1225" y="702">7. Review and Confirmation</text>
  <rect class="button" x="1380" y="755" width="180" height="42" rx="5"/><text class="label center" x="1470" y="781">Finish demo</text>

  <!-- Success pages, same content at every width -->
  <text class="heading" x="30" y="858">Success pages — separately translated in Spanish, English and German</text>
  <rect class="panel" x="25" y="875" width="700" height="295" rx="8"/>
  <rect class="section" x="40" y="890" width="670" height="42" rx="5"/><text class="label" x="55" y="916">Logo + SteuerNotta</text><text class="text" x="590" y="916">Back Home</text>
  <text class="ok" x="375" y="982">✓</text><text class="heading center" x="375" y="1012">Demo completed</text>
  <text class="text center" x="375" y="1038">No form values submitted to or saved by SteuerNotta · Not tax advice · No ELSTER</text>
  <rect class="button" x="185" y="1070" width="155" height="42" rx="5"/><rect class="section" x="410" y="1070" width="155" height="42" rx="5"/>
  <text class="label center" x="262" y="1096">Back Home</text><text class="label center" x="487" y="1096">Return to Form</text>
  <text class="tiny center" x="375" y="1145">No answer summary · no download · no next steps</text>

  <rect class="panel" x="755" y="875" width="410" height="295" rx="8"/>
  <rect class="section" x="770" y="890" width="380" height="42" rx="5"/><text class="label" x="785" y="916">Logo</text><text class="text" x="1060" y="916">Back Home</text>
  <text class="ok" x="960" y="982">✓</text><text class="heading center" x="960" y="1012">Demo completed</text>
  <text class="tiny center" x="960" y="1036">No values submitted/saved by SteuerNotta · No advice · No ELSTER</text>
  <rect class="button" x="800" y="1070" width="145" height="42" rx="5"/><rect class="section" x="975" y="1070" width="145" height="42" rx="5"/>
  <text class="label center" x="872" y="1096">Back Home</text><text class="label center" x="1047" y="1096">Return to Form</text>
  <text class="tiny center" x="960" y="1145">No summary · no download · no next steps</text>

  <rect class="panel" x="1195" y="875" width="380" height="295" rx="8"/>
  <rect class="section" x="1210" y="890" width="350" height="42" rx="5"/><text class="label" x="1225" y="916">Logo</text><text class="text" x="1480" y="916">Back Home</text>
  <text class="ok" x="1385" y="982">✓</text><text class="heading center" x="1385" y="1012">Demo completed</text>
  <text class="tiny center" x="1385" y="1036">No values submitted/saved by SteuerNotta · No advice · No ELSTER</text>
  <rect class="button" x="1225" y="1070" width="150" height="42" rx="5"/><rect class="section" x="1395" y="1070" width="150" height="42" rx="5"/>
  <text class="label center" x="1300" y="1096">Back Home</text><text class="label center" x="1470" y="1096">Return to Form</text>
  <text class="tiny center" x="1385" y="1145">No summary · no download · no next steps</text>
</svg>
